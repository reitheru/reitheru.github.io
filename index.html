<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Simple Life</title>
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #fffaf7;
      font-family: 'Noto Sans JP', sans-serif;
      color: #444;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #f3c6c6;
      text-align: center;
      padding: 40px 0;
      border-bottom: 2px solid #d8cfc4;
    }
    h1 {
      font-family: 'Dela Gothic One', cursive;
      color: #444;
      margin: 0;
      letter-spacing: 2px;
    }
    main {
      max-width: 700px;
      margin: 50px auto;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    h2 {
      color: #f3a6a6;
      border-left: 4px solid #f3a6a6;
      padding-left: 10px;
      font-size: 1.2em;
    }
    p {
      line-height: 1.8;
    }
    footer {
      text-align: center;
      color: #777;
      padding: 30px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <header>
    <h1>Simple Life</h1>
  </header>
  <main>
    <h2>今日のこと</h2>
    <p>お気に入りのカフェでゆっくり読書☕  
    穏やかな時間が流れて、心もリセットされた気がする。</p>
  </main>
  <footer>
    © 2025
  </footer>
</body>
</html>
